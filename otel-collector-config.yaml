receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: detailed

  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    traces_index: "ft-observability-traces"
    logs_index: "ft-observability-logs"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, elasticsearch]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, elasticsearch]